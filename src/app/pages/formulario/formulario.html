<div class="overlay">
  <div class="modal">

    <!--header-->
    <div class="modal-header">
      <h2>
        {{ pessoaEditar ? 'Editar Pessoa' : 'Nova Pessoa' }}
      </h2>
      <span (click)="fecharFormulario()">×</span>
    </div>

    <!--dados pessoais-->
    <h3>Dados Pessoais</h3>
    <div class="grid">

      <input type="text" placeholder="CPF" [(ngModel)]="pessoa.cpf" inputmode="numeric">
      <input type="text" placeholder="RG" [(ngModel)]="pessoa.rg" inputmode="numeric">
      <input placeholder="Nome Completo" [(ngModel)]="pessoa.nome">

      <input type="date" [(ngModel)]="pessoa.data_nasc">
      <input type="number" placeholder="Idade" [(ngModel)]="pessoa.idade">
      <select [(ngModel)]="pessoa.sexo">
        <option value="">Selecione</option>
        <option value="Masculino">Masculino</option>
        <option value="Feminino">Feminino</option>
        <option value="Outro">Outro</option>
      </select>

      <input placeholder="Signo" [(ngModel)]="pessoa.signo">
      <input placeholder="Nome da Mãe" [(ngModel)]="pessoa.mae">
      <input placeholder="Nome do Pai" [(ngModel)]="pessoa.pai">

    </div>

    <!--contato-->
    <h3>Dados de Contato</h3>
    <div class="grid">

      <input type="email" placeholder="Email" [(ngModel)]="pessoa.email">
      <div class="senha-box">
      <input
        [type]="mostrarSenha ? 'text' : 'password'"
        [(ngModel)]="pessoa.senha"
        placeholder="Senha"
      >
      <span (click)="toggleSenha()" class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="#555">
          <path d="M607.5-372.5Q660-425 660-500t-52.5-127.5Q555-680 480-680t-127.5 52.5Q300-575 300-500t52.5 127.5Q405-320 480-320t127.5-52.5Zm-204-51Q372-455 372-500t31.5-76.5Q435-608 480-608t76.5 31.5Q588-545 588-500t-31.5 76.5Q525-392 480-392t-76.5-31.5ZM214-281.5Q94-363 40-500q54-137 174-218.5T480-800q146 0 266 81.5T920-500q-54 137-174 218.5T480-200q-146 0-266-81.5Z"/>
        </svg>
      </span>
      </div>

      <input type="tel" placeholder="Telefone Fixo" [(ngModel)]="pessoa.telefone_fixo">
      <input type="tel" placeholder="Celular" [(ngModel)]="pessoa.celular">

    </div>

    <!--endereco-->
    <h3>Endereço</h3>
    <div class="grid">

      <input placeholder="CEP" [(ngModel)]="pessoa.cep">
      <input placeholder="Endereço" [(ngModel)]="pessoa.endereco">

      <input placeholder="Número" [(ngModel)]="pessoa.numero">
      <input placeholder="Bairro" [(ngModel)]="pessoa.bairro">
      <input placeholder="Cidade" [(ngModel)]="pessoa.cidade">

      <input placeholder="Estado" [(ngModel)]="pessoa.estado">

    </div>

    <!--dados fisicos-->
    <h3>Dados Físicos</h3>
    <div class="grid">

      <input placeholder="Altura" [(ngModel)]="pessoa.altura">
      <input placeholder="Peso" [(ngModel)]="pessoa.peso">
      <select [(ngModel)]="pessoa.tipo_sanguineo">
          <option value="">Selecione</option>
          <option>A+</option>
          <option>A-</option>
          <option>B+</option>
          <option>B-</option>
          <option>AB+</option>
          <option>AB-</option>
          <option>O+</option>
          <option>O-</option>
      </select>
      <input placeholder="Cor" [(ngModel)]="pessoa.cor">

    </div>

    <div class="modal-footer">
      <button type="button" class="cancel" (click)="fecharFormulario()">Cancelar</button>
      <button type="button" class="save" (click)="salvar()">Adicionar</button>
    </div>
  </div>
</div>
